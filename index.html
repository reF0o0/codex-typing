<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Practice</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f2f5;
  color: #1e293b;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 24px 16px 48px;
}

.container {
  width: 100%;
  max-width: 800px;
}

header {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}

header h1 {
  font-size: 1.25rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-right: auto;
}

.controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

select, button {
  font-family: inherit;
  font-size: 0.875rem;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid #d1d5db;
  background: #fff;
  color: #1e293b;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}

select:hover { border-color: #9ca3af; }
select:focus, button:focus-visible { outline: 2px solid #3b82f6; outline-offset: 1px; }

button.primary {
  background: #3b82f6;
  color: #fff;
  border-color: #3b82f6;
  font-weight: 500;
}
button.primary:hover { background: #2563eb; border-color: #2563eb; }
button.primary:disabled { background: #93c5fd; border-color: #93c5fd; cursor: not-allowed; }

button.danger {
  background: transparent;
  color: #ef4444;
  border-color: #fca5a5;
}
button.danger:hover { background: #fef2f2; }

button.continue-btn {
  background: #10b981;
  color: #fff;
  border-color: #10b981;
  font-weight: 500;
}
button.continue-btn:hover { background: #059669; border-color: #059669; }


.practice-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 24px;
  margin-bottom: 24px;
}

.idle-hint {
  text-align: center;
  color: #94a3b8;
  padding: 48px 0;
  font-size: 0.938rem;
}

.target-display {
  font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
  font-size: 1.125rem;
  line-height: 1.8;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  padding: 20px 24px;
  margin-bottom: 16px;
  white-space: pre-wrap;
  word-break: break-word;
  min-height: 120px;
}

.target-display .correct { color: #10b981; }
.target-display .incorrect { color: #ef4444; background: #fef2f2; text-decoration: underline; text-decoration-color: #ef4444; }
.target-display .untyped { color: #94a3b8; }

.stats-bar {
  display: flex;
  gap: 24px;
  margin-bottom: 12px;
  font-size: 0.875rem;
  color: #64748b;
}

.stats-bar .stat {
  display: flex;
  align-items: center;
  gap: 4px;
}

.stats-bar .stat-value {
  font-weight: 600;
  color: #1e293b;
  font-variant-numeric: tabular-nums;
}

.stats-bar .timer-warning { color: #ef4444; font-weight: 700; }

#inputArea {
  width: 100%;
  font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
  font-size: 1.125rem;
  line-height: 1.8;
  background: #1e293b;
  color: #e2e8f0;
  border: 2px solid #334155;
  border-radius: 6px;
  padding: 16px 20px;
  resize: vertical;
  min-height: 100px;
  outline: none;
  transition: border-color 0.15s;
}

#inputArea:focus { border-color: #3b82f6; }
#inputArea:disabled { opacity: 0.4; cursor: not-allowed; }

.results {
  text-align: center;
  padding: 32px 0;
}

.results h2 {
  font-size: 1.125rem;
  font-weight: 600;
  margin-bottom: 20px;
}

.results-grid {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-bottom: 24px;
}

.result-item {
  text-align: center;
}

.result-item .value {
  font-size: 2rem;
  font-weight: 700;
  color: #3b82f6;
  font-variant-numeric: tabular-nums;
}

.result-item .label {
  font-size: 0.813rem;
  color: #64748b;
  margin-top: 2px;
}

.history-section h2 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 12px;
}

.history-table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  overflow: hidden;
  font-size: 0.813rem;
}

.history-table th, .history-table td {
  text-align: left;
  padding: 10px 12px;
}

.history-table th {
  background: #f8fafc;
  font-weight: 500;
  color: #64748b;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  border-bottom: 1px solid #e2e8f0;
}

.history-table td {
  border-bottom: 1px solid #f1f5f9;
  color: #334155;
}

.history-table tr:last-child td { border-bottom: none; }

.history-table .text-preview {
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.history-empty {
  text-align: center;
  color: #94a3b8;
  padding: 32px 0;
  font-size: 0.875rem;
}

.history-footer {
  text-align: right;
  margin-top: 12px;
}

.hidden { display: none !important; }

@media (max-width: 600px) {
  header { flex-direction: column; align-items: flex-start; }
  .controls { width: 100%; }
  .results-grid { gap: 16px; }
  .result-item .value { font-size: 1.5rem; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Typing Practice</h1>
    <div class="controls">
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <select id="timeLimit">
        <option value="30">30s</option>
        <option value="60" selected>60s</option>
        <option value="0">Unlimited</option>
        <option value="120">120s</option>
      </select>
      <button id="startBtn" class="primary">Start</button>
      <button id="exitBtn" class="danger hidden">Exit</button>
    </div>
  </header>

  <div class="practice-card">
    <div id="practiceArea" class="hidden">
      <div id="targetDisplay" class="target-display"></div>
      <div class="stats-bar">
        <div class="stat">Time: <span id="timer" class="stat-value">60s</span></div>
        <div class="stat">WPM: <span id="liveWpm" class="stat-value">0</span></div>
        <div class="stat">Accuracy: <span id="liveAccuracy" class="stat-value">100%</span></div>
        <div class="stat">Chars: <span id="liveChars" class="stat-value">0</span></div>
      </div>
      <textarea id="inputArea" placeholder="Start typing here..." disabled></textarea>
    </div>

    <div id="resultsArea" class="hidden">
      <div class="results">
        <h2 id="resultsHeading">Practice Complete</h2>
        <div class="results-grid">
          <div class="result-item">
            <div class="value" id="resultWpm">0</div>
            <div class="label">WPM</div>
          </div>
          <div class="result-item">
            <div class="value" id="resultAccuracy">0%</div>
            <div class="label">Accuracy</div>
          </div>
          <div class="result-item">
            <div class="value" id="resultTime">0s</div>
            <div class="label">Time Used</div>
          </div>
        </div>
        <button id="retryBtn" class="primary">Try Again</button>
        <button id="continueBtn" class="continue-btn">Continue +30s</button>

      </div>
    </div>

    <div id="idleHint" class="idle-hint">
      Select difficulty and time, then click Start to begin.
    </div>
  </div>

  <div class="history-section">
    <h2>History</h2>
    <div id="historyContent"></div>
  </div>
</div>

<script>
(function() {
  const CORPUS = {
    easy: [
      "A: Hi, welcome to the team!\nB: Thank you! Excited to be here.\nA: Let me show you around the office.\nB: That would be great, thanks!",
      "A: Good morning! Ready for the meeting?\nB: Yes, I have the report ready.\nA: Great, let's head to the conference room.\nB: After you!",
      "A: Could you help me with this file?\nB: Sure, let me take a look.\nA: I can't find the save button.\nB: It's right here in the top corner.",
      "A: What time is the team lunch?\nB: It's at twelve thirty.\nA: Where are we going?\nB: The Italian place around the corner.",
      "A: Do you have a pen I can borrow?\nB: Here you go. Keep it.\nA: Thanks, I'll return it later.\nB: No rush at all!",
      "A: I'm heading to the break room.\nB: Could you grab me a coffee?\nA: Sure. How do you take it?\nB: Just black, thanks!",
      "A: The printer is out of paper.\nB: I'll grab some from the supply closet.\nA: Thanks! I need to print this contract.\nB: No problem, happy to help.",
      "A: Is the boss in today?\nB: Yes, she's in her office.\nA: I need to submit this report.\nB: She's free right now, go ahead.",
      "A: Welcome to the company!\nB: Thanks! Everyone has been so friendly.\nA: Let me introduce you to the team.\nB: I'd really appreciate that.",
      "A: Can you send me that email again?\nB: Sure, I'll forward it right now.\nA: Got it, thanks a lot!\nB: Anytime, let me know if you need help.",
      "A: Happy Friday! Big plans for the weekend?\nB: Just relaxing at home. You?\nA: Going hiking with some friends.\nB: Sounds fun! Enjoy it!",
      "A: Could you dim the lights in here?\nB: The switch is by the door.\nA: Found it. Thanks!\nB: No problem, the glare was bad.",
      "A: I'm new here. Where's the restroom?\nB: Down the hall, turn left.\nA: Thanks for your help!\nB: Happy to help a new colleague.",
      "A: The coffee machine is broken again.\nB: Let me call maintenance.\nA: Thanks, I really need my morning coffee.\nB: I know the feeling!",
      "A: Did you finish the spreadsheet?\nB: Almost done. Just need to double-check.\nA: Take your time, accuracy matters more.\nB: Thanks for understanding!"
    ],
    medium: [
      "A: I've scheduled the project kickoff for tomorrow at ten.\nB: Perfect. Do we have the agenda ready?\nA: I drafted one. Could you review it before the meeting?\nB: Sure, send it over and I'll take a look.",
      "A: The quarterly review is coming up next week.\nB: I know. I'm still compiling the sales data.\nA: Let me know if you need any help with the charts.\nB: Actually, could you help format the presentation slides?",
      "A: I'm not sure about the budget for this quarter.\nB: Let's review the actuals against the forecast.\nA: Good idea. I'll pull the numbers from the system.\nB: Let's meet this afternoon to go through them.",
      "A: The client called and requested a deadline extension.\nB: How much more time are they asking for?\nA: They said two weeks would be ideal.\nB: Let's check our capacity before agreeing.",
      "A: I noticed some errors in the monthly report.\nB: Oh no, where are the mistakes?\nA: The revenue numbers in section three don't add up.\nB: Thanks for catching that. I'll correct it right away.",
      "A: Could you walk me through this process?\nB: Of course. Let me share my screen.\nA: Great, I'm a visual learner.\nB: I'll go slow so you can take notes.",
      "A: We need to hire two more engineers this quarter.\nB: I've posted the job descriptions online already.\nA: Have we received any promising applications yet?\nB: A few, but I'd like to widen the search.",
      "A: The presentation went really well this morning.\nB: I agree. The investors seemed impressed.\nA: They asked great questions about our growth plan.\nB: Let's send them the follow-up materials by Friday.",
      "A: I'm working on the onboarding documentation.\nB: That's much needed. Our current docs are outdated.\nA: I'll include screenshots and step-by-step guides.\nB: That will save the new hires a lot of confusion.",
      "A: The WiFi has been unstable all morning.\nB: I'll put in a ticket with IT right now.\nA: Thanks, I have a video call in thirty minutes.\nB: They usually respond pretty quickly to urgent requests.",
      "A: I appreciate your feedback on my proposal.\nB: You're welcome. The core idea is very strong.\nA: I'll revise the financial section based on your notes.\nB: Great. Let me know when the second draft is ready.",
      "A: We missed our shipment deadline by two days.\nB: What caused the delay this time?\nA: The supplier ran into raw material shortages.\nB: We need to find a backup supplier to avoid this.",
      "A: I'd like to request some training courses.\nB: Great initiative. Which areas are you interested in?\nA: Project management and data analysis.\nB: I'll check the budget and get back to you.",
      "A: The team morale seems a bit low lately.\nB: I've noticed that too. Maybe we need a team event.\nA: A casual lunch or an offsite might help.\nB: Let me organize something for next month.",
      "A: I need to reschedule our one-on-one meeting.\nB: No problem. How does Thursday at two sound?\nA: That works perfectly. See you then.\nB: Great. I'll update the calendar invite."
    ],
    hard: [
      "A: The merger due diligence has uncovered several risks in their financials.\nB: What specific red flags stood out to your team?\nA: Their accounts receivable is overstated by roughly twelve percent.\nB: That's significant. We need to adjust our valuation model accordingly.\nA: I've already run three scenarios based on different adjustment ranges.\nB: Let's present the worst-case scenario to the board on Monday.",
      "A: I'm concerned about the attrition rate in the engineering division.\nB: What's the turnover figure for the past two quarters?\nA: It's hovering around eighteen percent, which is above industry average.\nB: Have we conducted exit interviews to identify the root cause?\nA: We have, and compensation and growth opportunities are the top themes.\nB: Then we need to revisit our total rewards strategy immediately.",
      "A: The Q4 earnings call is in three weeks and the script isn't ready.\nB: I've compiled the key metrics, but the narrative still needs work.\nA: Let's structure it around the three strategic pillars we announced in January.\nB: That creates continuity. I'll draft the narrative by end of week.\nA: Make sure the messaging around the restructuring is carefully framed.\nB: Absolutely. We need to convey confidence without overpromising.",
      "A: Our supply chain vulnerability was exposed by last quarter's disruption.\nB: I've proposed diversifying suppliers across three different regions.\nA: That would increase operational complexity in the short term.\nB: True, but the risk mitigation benefit far outweighs the added overhead.\nA: What's the projected timeline for onboarding the new suppliers?\nB: If we move fast, we can have the first alternative supplier qualified by Q2.",
      "A: I reviewed your strategic proposal and have some reservations.\nB: I appreciate the candid feedback. Which areas concern you?\nA: The market size assumptions seem overly optimistic by a large margin.\nB: I used the upper end of the analyst projections. Let me recalibrate.\nA: I'd also like to see a more conservative revenue ramp scenario.\nB: Understood. I'll run the model with a broader range of inputs.",
      "A: The board is pushing for a more aggressive digital transformation timeline.\nB: Do they understand the organizational change management required?\nA: I don't think they fully appreciate the cultural shift involved.\nB: We should present a phased roadmap with realistic milestones and risks.\nA: Agreed. Let's include case studies from companies that rushed this process.\nB: That will ground the discussion in real outcomes rather than theory.",
      "A: I'm recommending we promote Sarah to the director position.\nB: Her technical credentials are unquestionable. How's her leadership track record?\nA: She's mentored three juniors who've all exceeded performance targets.\nB: And her cross-functional collaboration? That's critical at the director level.\nA: She led the integration project with marketing last year very successfully.\nB: Then I'm fully on board. Let's prepare the offer package.",
      "A: The new pricing model is getting pushback from the sales team.\nB: What's their primary concern with the proposed structure?\nA: They feel it will make closing deals harder in competitive situations.\nB: Have we shared the data showing it increases customer lifetime value?\nA: They've seen it, but near-term quotas are what drive their behavior.\nB: Then we need to align the compensation plan with the new pricing strategy.",
      "A: We're facing a potential intellectual property dispute with a competitor.\nB: Has legal reviewed the patent claims they're asserting against us?\nA: Yes, and they believe two of the claims have merit worth addressing.\nB: We should consider a cross-licensing agreement before this escalates.\nA: That's a pragmatic approach. I'll instruct our counsel to open that channel.\nB: Let's also conduct a broader IP audit to identify any other exposure.",
      "A: Our customer satisfaction scores dropped for the third consecutive month.\nB: I've analyzed the survey comments and support ticket trends.\nA: What's the common thread across the negative feedback?\nB: Response time and first-contact resolution rate are the main drivers.\nA: We need to invest in the support team headcount and training.\nB: I've prepared a business case that shows the ROI of these investments.",
      "A: I'd like to restructure my department to improve efficiency.\nB: Walk me through the current pain points you're trying to solve.\nA: There's too many layers between strategy and execution right now.\nB: So you're proposing a flatter organizational structure?\nA: Exactly. Fewer handoffs and faster decision-making at every level.\nB: I support the direction. Present a detailed plan at the next leadership meeting.",
      "A: The startup we invested in is preparing for a Series B round.\nB: What's their valuation expectation and current burn rate?\nA: They're targeting a fifty percent increase with eighteen months of runway.\nB: That's reasonable given their traction and market conditions.\nA: Should we participate or let new investors lead the round?\nB: I say we double down. Their product-market fit is stronger than ever.",
      "A: I'm concerned about the compliance implications of our new data strategy.\nB: Have we had the privacy team assess the regulatory exposure?\nA: Their preliminary review flagged several gaps in our data retention policies.\nB: Then we need to pause implementation until those are fully addressed.\nA: I agree, but the product team is eager to launch on schedule.\nB: Regulatory risk is not worth compromising. Let me handle the product team.",
      "A: The annual performance review process needs a complete overhaul.\nB: What specific aspects are not working well for your teams?\nA: The rating system feels arbitrary, and feedback comes too infrequently.\nB: Would you prefer a continuous feedback model with quarterly check-ins?\nA: Yes, and I'd like to shift from numeric ratings to development-focused conversations.\nB: Let me form a task force to design the new framework over the next quarter.",
      "A: Our competitor just launched a product that directly competes with our flagship.\nB: I saw the announcement. Their feature set is surprisingly comparable.\nA: We need a response strategy that doesn't undermine our pricing.\nB: Let's accelerate the next feature release and emphasize our reliability advantage.\nA: I also want to double down on customer success and support differentiation.\nB: Smart move. Features can be copied, but relationships and trust are harder to replicate."
    ]
  };

  const HISTORY_KEY = 'typing-practice-history';
  const MAX_HISTORY = 50;

  const difficultySel = document.getElementById('difficulty');
  const timeLimitSel = document.getElementById('timeLimit');
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');
  const continueBtn = document.getElementById("continueBtn");

  const exitBtn = document.getElementById('exitBtn');
  const practiceArea = document.getElementById('practiceArea');
  const resultsArea = document.getElementById('resultsArea');
  const idleHint = document.getElementById('idleHint');
  const targetDisplay = document.getElementById('targetDisplay');
  const inputArea = document.getElementById('inputArea');
  const timerEl = document.getElementById('timer');
  const liveWpmEl = document.getElementById('liveWpm');
  const liveAccuracyEl = document.getElementById('liveAccuracy');
  const liveCharsEl = document.getElementById('liveChars');
  const resultWpmEl = document.getElementById('resultWpm');
  const resultAccuracyEl = document.getElementById('resultAccuracy');
  const resultTimeEl = document.getElementById('resultTime');
  const resultsHeading = document.getElementById('resultsHeading');
  const historyContent = document.getElementById('historyContent');

  let state = {
    phase: 'idle',
    difficulty: 'medium',
    timeLimit: 60,
    timeRemaining: 60,
    targetText: '',
    targetChars: [],
    startTime: null,
    timerInterval: null,
    completedEarly: false,
    endedByTimeout: false
  };

  function loadHistory() {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function saveHistory(entry) {
    try {
      const history = loadHistory();
      history.unshift(entry);
      if (history.length > MAX_HISTORY) history.length = MAX_HISTORY;
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    } catch (e) { /* localStorage unavailable, silently skip */ }
  }

  function clearHistory() {
    try { localStorage.removeItem(HISTORY_KEY); } catch (e) {}
    renderHistory();
  }

  function pickDialogue(difficulty) {
    const pool = CORPUS[difficulty] || CORPUS.medium;
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function renderTarget() {
    const chars = [...state.targetText];
    state.targetChars = chars;
    targetDisplay.innerHTML = chars.map((ch, i) => {
      if (ch === '\n') return `<span data-idx="${i}" class="untyped"><br></span>`;
      let esc = ch;
      if (ch === '&') esc = '&amp;';
      else if (ch === '<') esc = '&lt;';
      else if (ch === '>') esc = '&gt;';
      return `<span data-idx="${i}" class="untyped">${esc}</span>`;
    }).join('');
  }

  function updateComparison() {
    const input = inputArea.value;
    const spans = targetDisplay.querySelectorAll('span');
    let correctCount = 0;
    let allCorrect = true;

    spans.forEach((span, i) => {
      if (i < input.length) {
        if (input[i] === state.targetChars[i]) {
          span.className = 'correct';
          correctCount++;
        } else {
          span.className = 'incorrect';
          allCorrect = false;
        }
      } else {
        span.className = 'untyped';
        allCorrect = false;
      }
    });

    const totalTyped = input.length;
    const accuracy = totalTyped > 0 ? Math.round((correctCount / totalTyped) * 100) : 100;
    const elapsed = (Date.now() - state.startTime) / 1000;
    const wpm = elapsed > 0 ? Math.round((correctCount / 5) / (elapsed / 60)) : 0;

    liveWpmEl.textContent = wpm;
    liveAccuracyEl.textContent = accuracy + '%';
    liveCharsEl.textContent = totalTyped;

    if (allCorrect && input.length >= state.targetChars.length) {
      state.completedEarly = true;
      endPractice();
    }
  }

  function tick() {
    if (state.timeLimit === 0) {
      state.timeRemaining++;
      timerEl.textContent = state.timeRemaining + 's';
    } else {
      state.timeRemaining--;
      timerEl.textContent = state.timeRemaining + 's';
    }

    const elapsed = (Date.now() - state.startTime) / 1000;
    const input = inputArea.value;
    let correctCount = 0;
    for (let i = 0; i < Math.min(input.length, state.targetChars.length); i++) {
      if (input[i] === state.targetChars[i]) correctCount++;
    }
    const wpm = elapsed > 0 ? Math.round((correctCount / 5) / (elapsed / 60)) : 0;
    liveWpmEl.textContent = wpm;

    if (state.timeLimit !== 0) {
      if (state.timeRemaining <= 10) {
        timerEl.classList.add('timer-warning');
      }

      if (state.timeRemaining <= 0) {
        state.endedByTimeout = true;
        endPractice();
      }
    }
  }

  function startPractice() {
   state.difficulty = difficultySel.value;
   state.timeLimit = parseInt(timeLimitSel.value, 10);
   state.timeRemaining = state.timeLimit;
   state.targetText = pickDialogue(state.difficulty);
   state.targetChars = [];
   state.startTime = Date.now();
   state.phase = 'active';
   state.completedEarly = false;
   state.endedByTimeout = false;

   renderTarget();
   inputArea.value = '';
   inputArea.disabled = false;
   inputArea.focus();
    exitBtn.classList.remove('hidden');

   timerEl.textContent = state.timeRemaining + 's';
   timerEl.classList.remove('timer-warning');
   liveWpmEl.textContent = '0';
   liveAccuracyEl.textContent = '100%';
   liveCharsEl.textContent = '0';

   practiceArea.classList.remove('hidden');
   resultsArea.classList.add('hidden');
   idleHint.classList.add('hidden');
   startBtn.disabled = true;
   difficultySel.disabled = true;
   timeLimitSel.disabled = true;

   clearInterval(state.timerInterval);
   state.timerInterval = setInterval(tick, 1000);
 }

  function endPractice() {
   clearInterval(state.timerInterval);
   state.timerInterval = null;
   state.phase = 'finished';

   inputArea.disabled = true;
   startBtn.disabled = false;
   difficultySel.disabled = false;
   timeLimitSel.disabled = false;

   const input = inputArea.value;
   let correctCount = 0;
   for (let i = 0; i < Math.min(input.length, state.targetChars.length); i++) {
     if (input[i] === state.targetChars[i]) correctCount++;
   }
   const totalTyped = input.length;
   const accuracy = totalTyped > 0 ? Math.round((correctCount / totalTyped) * 100) : 100;
   const elapsedSec = Math.round((Date.now() - state.startTime) / 1000);
   const elapsedMin = elapsedSec / 60;
   const wpm = elapsedMin > 0 ? Math.round((correctCount / 5) / elapsedMin) : 0;

   resultWpmEl.textContent = wpm;
   resultAccuracyEl.textContent = accuracy + '%';
   resultTimeEl.textContent = elapsedSec + 's';
   resultsHeading.textContent = state.completedEarly ? 'Well Done!' : (state.timeLimit === 0 ? 'Practice Complete' : 'Time\'s Up!');

   practiceArea.classList.add('hidden');
   retryBtn.classList.remove('hidden');
   resultsArea.classList.remove('hidden');
   if (state.endedByTimeout) {
     continueBtn.classList.remove('hidden');
   } else {
     continueBtn.classList.add('hidden');
   }
    exitBtn.classList.remove('hidden');

   saveHistory({
     date: new Date().toLocaleString('en-US', { hour12: false }),
     difficulty: state.difficulty,
     timeLimit: state.timeLimit,
     wpm: wpm,
     accuracy: accuracy,
     elapsedSec: elapsedSec,
     textPreview: state.targetText.substring(0, 80).replace(/\n/g, ' ')
   });

   renderHistory();
 }

  function continuePractice() {
   state.endedByTimeout = false;
   state.phase = "active";
   state.timeRemaining += 30;

   inputArea.disabled = false;
   inputArea.focus();
   timerEl.classList.remove("timer-warning");
   timerEl.textContent = state.timeRemaining + "s";

   continueBtn.classList.add("hidden");
   retryBtn.classList.add("hidden");

   practiceArea.classList.remove("hidden");
   resultsArea.classList.add("hidden");

   clearInterval(state.timerInterval);
   state.timerInterval = setInterval(tick, 1000);
 }

  function renderHistory() {
    const history = loadHistory();
    if (history.length === 0) {
      historyContent.innerHTML = '<div class="history-empty">No practice history yet. Start a session to see your results here.</div>';
      return;
    }

    const rows = history.map((entry, i) => {
      const diffLabel = { easy: 'Easy', medium: 'Medium', hard: 'Hard' }[entry.difficulty] || entry.difficulty;
      return `<tr>
        <td>${entry.date || '-'}</td>
        <td>${diffLabel}</td>
        <td>${entry.timeLimit === 0 ? '∞' : ((entry.timeLimit || '-') + 's')}</td>
        <td>${entry.wpm != null ? entry.wpm : '-'}</td>
        <td>${entry.accuracy != null ? entry.accuracy + '%' : '-'}</td>
        <td class="text-preview" title="${(entry.textPreview || '').replace(/"/g, '&quot;')}">${entry.textPreview || '-'}</td>
      </tr>`;
    }).join('');

    historyContent.innerHTML = `
      <table class="history-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Difficulty</th>
            <th>Time</th>
            <th>WPM</th>
            <th>Accuracy</th>
            <th>Text</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="history-footer">
        <button id="clearHistoryBtn" class="danger">Clear History</button>
      </div>`;

    document.getElementById('clearHistoryBtn').addEventListener('click', function() {
      if (confirm('Clear all practice history?')) clearHistory();
    });
  }


  function exitPractice() {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
    state.phase = 'idle';

    inputArea.disabled = true;
    inputArea.value = '';
    startBtn.disabled = false;
    difficultySel.disabled = false;
    timeLimitSel.disabled = false;
    exitBtn.classList.add('hidden');

    practiceArea.classList.add('hidden');
    resultsArea.classList.add('hidden');
    idleHint.classList.remove('hidden');
  }

  startBtn.addEventListener('click', startPractice);
 retryBtn.addEventListener('click', startPractice);
  continueBtn.addEventListener('click', function() {
    retryBtn.classList.remove('hidden');
    continuePractice();
  });
  exitBtn.addEventListener('click', exitPractice);

  inputArea.addEventListener('input', updateComparison);

  inputArea.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
    }
    if (e.key === 'Enter') {
      var nextIdx = inputArea.value.length;
      if (nextIdx < state.targetChars.length && state.targetChars[nextIdx] !== '\n') {
        e.preventDefault();
      } else if (nextIdx >= state.targetChars.length) {
        e.preventDefault();
      }
    }
    if (state.phase !== 'active') {
      e.preventDefault();
    }
  });

  renderHistory();
})();
</script>
</body>
</html>
